name: Deploy to production

on:
  push:
    branches:
      - master

jobs:
  deploy_to_production:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_LATEST_URL: ghcr.io/ldvarevalo/replay-service:latest
      IMAGE_COMMIT_SHA_URL: ghcr.io/ldvarevalo/replay-service:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker images
        run: |
          docker build \
            -t ${{ env.IMAGE_LATEST_URL }} \
            -t ${{ env.IMAGE_COMMIT_SHA_URL }} \
            --platform=linux/amd64 \
            .

      - name: Push image with commit SHA version
        run: docker push ${{ env.IMAGE_COMMIT_SHA_URL }}

      - name: Push image with latest version
        run: docker push ${{ env.IMAGE_LATEST_URL }}

      - name: Trigger Render deploy
        run: curl -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
